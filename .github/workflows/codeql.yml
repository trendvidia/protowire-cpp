name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (cpp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 protobuf-compiler libprotobuf-dev

      - uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality

      - name: Configure + build (drives CodeQL extraction)
        env:
          CC:  gcc-13
          CXX: g++-13
        run: |
          cmake -S . -B build
          cmake --build build -j

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
